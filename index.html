<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Death Race Pro - Neon Edition</title>
    <link href="https://fonts.font.im/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tajawal', sans-serif; user-select: none; }
        body { background-color: #050510; color: white; overflow: hidden; touch-action: none; }
        
        #gameCanvas { display: block; width: 100vw; height: 100vh; }
        
        /* واجهة المستخدم (HUD) */
        .hud {
            position: absolute; top: 15px; left: 15px; right: 15px;
            display: flex; justify-content: space-between; z-index: 10;
            pointer-events: none;
        }
        .hud-box {
            background: rgba(0, 0, 0, 0.7); border: 2px solid #ff2a5f;
            padding: 10px 15px; border-radius: 10px; box-shadow: 0 0 10px rgba(255, 42, 95, 0.5);
            font-size: 18px; font-weight: bold; text-align: center;
        }
        .coin-text { color: #f1c40f; font-size: 22px; }
        .score-text { color: #00d2ff; font-size: 22px; }
        
        /* شريط الصحة */
        .health-container { width: 150px; background: #222; border-radius: 5px; margin-top: 5px; overflow: hidden; border: 1px solid #fff; }
        .health-bar { height: 10px; background: #00e676; width: 100%; transition: width 0.2s, background 0.2s; }
        
        /* شاشة البداية والنهاية */
        .screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(5, 5, 16, 0.9); display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 20; backdrop-filter: blur(5px);
        }
        .title { font-size: 50px; color: #ff2a5f; text-shadow: 0 0 20px #ff2a5f; margin-bottom: 30px; font-weight: 900; text-align: center; direction: rtl;}
        .btn {
            background: linear-gradient(45deg, #ff2a5f, #ff7e9e); border: none; padding: 15px 40px;
            font-size: 24px; color: white; border-radius: 50px; cursor: pointer;
            box-shadow: 0 0 20px rgba(255, 42, 95, 0.6); transition: transform 0.2s; font-weight: bold; margin: 10px;
        }
        .btn:active { transform: scale(0.9); }
        
        /* أزرار الموبايل */
        .mobile-controls {
            position: absolute; bottom: 30px; left: 0; width: 100%;
            display: flex; justify-content: space-between; padding: 0 20px; z-index: 10;
        }
        .dir-controls { display: flex; gap: 15px; }
        .m-btn {
            width: 70px; height: 70px; border-radius: 50%; background: rgba(0, 210, 255, 0.2);
            border: 2px solid #00d2ff; color: white; font-size: 30px; display: flex;
            align-items: center; justify-content: center; backdrop-filter: blur(4px);
        }
        .m-btn-shoot { background: rgba(255, 42, 95, 0.2); border-color: #ff2a5f; }
        .m-btn:active { background: rgba(255, 255, 255, 0.3); transform: scale(0.9); }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="mainMenu" class="screen">
        <div class="title">سباق الموت<br><span style="font-size: 30px; color:#00d2ff;">Neon Edition</span></div>
        <div style="margin-bottom: 20px; font-size: 20px;">الرصيد: <span id="menuCoins" class="coin-text">0</span> 💰</div>
        <button class="btn" id="startBtn">بدء السباق 🚀</button>
        <p style="margin-top:20px; color:#aaa;">الكمبيوتر: أسهم للتحكم + مسطرة للرمي</p>
    </div>

    <div id="gameOverScreen" class="screen hidden">
        <div class="title" style="color: red; text-shadow: 0 0 20px red;">تحطمت سيارتك!</div>
        <div style="font-size: 24px; margin-bottom: 10px;">النقاط: <span id="finalScore" class="score-text">0</span></div>
        <div style="font-size: 24px; margin-bottom: 30px;">جمعت: <span id="finalCoins" class="coin-text">0</span> 💰</div>
        <button class="btn" id="restartBtn">إعادة المحاولة 🔄</button>
    </div>

    <div id="gameUI" class="hud hidden">
        <div class="hud-box">
            <div>الصحة</div>
            <div class="health-container"><div id="healthBar" class="health-bar"></div></div>
        </div>
        <div class="hud-box">
            <div>النقاط: <span id="scoreDisplay" class="score-text">0</span></div>
            <div>المال: <span id="coinDisplay" class="coin-text">0</span></div>
        </div>
    </div>

    <div id="mobileControls" class="mobile-controls hidden">
        <div class="dir-controls">
            <div class="m-btn" id="btnLeft">←</div>
            <div class="m-btn" id="btnRight">→</div>
        </div>
        <div class="m-btn m-btn-shoot" id="btnShoot">🔥</div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // ربط الواجهات
        const mainMenu = document.getElementById('mainMenu');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const gameUI = document.getElementById('gameUI');
        const mobileControls = document.getElementById('mobileControls');
        const healthBar = document.getElementById('healthBar');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const coinDisplay = document.getElementById('coinDisplay');
        const menuCoins = document.getElementById('menuCoins');
        
        // إعدادات اللعبة
        let W, H;
        let roadSpeed = 15;
        let lineOffset = 0;
        let state = 'MENU'; // MENU, PLAYING, GAMEOVER
        let shakeTime = 0;
        
        // بيانات اللاعب
        let savedCoins = localStorage.getItem('deathRaceCoins') ? parseInt(localStorage.getItem('deathRaceCoins')) : 0;
        menuCoins.innerText = savedCoins;

        let player, entities, particles, keys;

        // ضبط حجم الشاشة
        function resize() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // التهيئة وبدء اللعبة
        function initGame() {
            player = {
                x: W / 2, y: H - 150, width: 45, height: 85,
                speed: 8, health: 100, maxHealth: 100,
                score: 0, sessionCoins: 0, lastShot: 0,
                color: '#00d2ff'
            };
            entities = []; // أعداء، طلقات، فلوس
            particles = [];
            keys = {};
            roadSpeed = 12;
            shakeTime = 0;
            
            state = 'PLAYING';
            mainMenu.classList.add('hidden');
            gameOverScreen.classList.add('hidden');
            gameUI.classList.remove('hidden');
            mobileControls.classList.remove('hidden');
            
            updateHUD();
            gameLoop();
        }

        // --- نظام الرسم ---
        function drawRoad() {
            // الشارع
            ctx.fillStyle = '#111';
            ctx.fillRect(0, 0, W, H);
            
            // الخطوط المتقطعة بالوسط
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)';
            ctx.lineWidth = 10;
            ctx.setLineDash([40, 40]);
            ctx.lineDashOffset = -lineOffset;
            
            ctx.beginPath();
            ctx.moveTo(W / 2 - 80, 0); ctx.lineTo(W / 2 - 80, H);
            ctx.moveTo(W / 2 + 80, 0); ctx.lineTo(W / 2 + 80, H);
            ctx.stroke();
            ctx.setLineDash([]);
            
            // حدود الشارع (عشب/رصيف)
            ctx.fillStyle = '#0a0a0a';
            ctx.fillRect(0, 0, W/2 - 180, H);
            ctx.fillRect(W/2 + 180, 0, W, H);
            
            ctx.strokeStyle = '#ff2a5f';
            ctx.lineWidth = 5;
            ctx.beginPath();
            ctx.moveTo(W/2 - 180, 0); ctx.lineTo(W/2 - 180, H);
            ctx.moveTo(W/2 + 180, 0); ctx.lineTo(W/2 + 180, H);
            ctx.stroke();

            lineOffset += roadSpeed;
        }

        function drawCar(c, isEnemy = false) {
            ctx.save();
            ctx.translate(c.x, c.y);
            
            // توهج نيون
            ctx.shadowBlur = 15;
            ctx.shadowColor = c.color;
            
            // جسم السيارة
            ctx.fillStyle = c.color;
            ctx.fillRect(-c.width/2, -c.height/2, c.width, c.height);
            
            // الزجاج
            ctx.shadowBlur = 0;
            ctx.fillStyle = '#000';
            ctx.fillRect(-c.width/2 + 5, -c.height/2 + 15, c.width - 10, 20); // أمامي
            ctx.fillRect(-c.width/2 + 5, c.height/2 - 25, c.width - 10, 15); // خلفي
            
            // أضواء
            ctx.fillStyle = isEnemy ? '#ff0000' : '#fff';
            ctx.fillRect(-c.width/2 + 2, -c.height/2 - 2, 10, 5);
            ctx.fillRect(c.width/2 - 12, -c.height/2 - 2, 10, 5);
            
            // نيران العادم (البنص) للاعب
            if (!isEnemy) {
                ctx.fillStyle = Math.random() > 0.5 ? '#ff9d00' : '#ff2a5f';
                ctx.beginPath();
                ctx.arc(-c.width/4, c.height/2 + Math.random()*15, 6, 0, Math.PI*2);
                ctx.arc(c.width/4, c.height/2 + Math.random()*15, 6, 0, Math.PI*2);
                ctx.fill();
            }
            
            ctx.restore();
        }

        // --- نظام التحديث والتفاعلات ---
        function update() {
            if (state !== 'PLAYING') return;

            // زيادة صعوبة اللعبة وسرعة الشارع تدريجياً
            roadSpeed = 12 + (player.score / 500);
            player.score += 1;

            // حركة اللاعب
            if (keys['ArrowLeft'] || keys['btnLeft']) player.x -= player.speed;
            if (keys['ArrowRight'] || keys['btnRight']) player.x += player.speed;
            
            // حدود الشارع
            if (player.x < W/2 - 150) player.x = W/2 - 150;
            if (player.x > W/2 + 150) player.x = W/2 + 150;

            // إطلاق النار
            if ((keys[' '] || keys['btnShoot']) && Date.now() - player.lastShot > 200) {
                player.lastShot = Date.now();
                entities.push({ type: 'bullet', x: player.x, y: player.y - player.height/2, w: 6, h: 20, speed: -20, color: '#00d2ff' });
            }

            // توليد أعداء وفلوس
            if (Math.random() < 0.03) {
                entities.push({
                    type: 'enemy', x: W/2 - 140 + Math.random() * 280, y: -100,
                    width: 45, height: 85, speed: roadSpeed - 4 + Math.random() * 3, // أبطأ من الشارع حتى يبينون يقتربون
                    color: '#ff2a5f', hp: 30
                });
            }
            if (Math.random() < 0.02) {
                entities.push({ type: 'coin', x: W/2 - 140 + Math.random() * 280, y: -50, radius: 15, speed: roadSpeed });
            }

            // تحديث العناصر (أعداء، فلوس، طلقات)
            for (let i = entities.length - 1; i >= 0; i--) {
                let e = entities[i];
                e.y += e.speed;

                // ذكاء العدو (يطاردك شوي)
                if (e.type === 'enemy' && e.y < player.y) {
                    if (e.x < player.x - 20) e.x += 1;
                    if (e.x > player.x + 20) e.x -= 1;
                }

                // مسح اللي يطلع برة الشاشة
                if (e.y > H + 100 || e.y < -200) { entities.splice(i, 1); continue; }

                // التصادم
                if (e.type === 'coin') {
                    if (Math.hypot(player.x - e.x, player.y - e.y) < 40) {
                        player.sessionCoins += 10;
                        createParticles(e.x, e.y, '#f1c40f');
                        entities.splice(i, 1);
                        continue;
                    }
                }

                if (e.type === 'enemy') {
                    // تصادم العدو مع اللاعب
                    if (Math.abs(player.x - e.x) < 40 && Math.abs(player.y - e.y) < 80) {
                        player.health -= 20;
                        shakeTime = 15;
                        createParticles(player.x, player.y - 40, '#ff0000');
                        entities.splice(i, 1);
                        if (player.health <= 0) gameOver();
                        continue;
                    }

                    // تصادم طلقاتك مع العدو
                    for (let j = entities.length - 1; j >= 0; j--) {
                        let b = entities[j];
                        if (b.type === 'bullet' && Math.abs(b.x - e.x) < 30 && Math.abs(b.y - e.y) < 45) {
                            e.hp -= 15;
                            entities.splice(j, 1); // مسح الطلقة
                            createParticles(b.x, b.y, '#ff9d00');
                            if (e.hp <= 0) {
                                createParticles(e.x, e.y, '#ff2a5f', 30);
                                player.score += 100;
                                shakeTime = 5;
                                entities.splice(i, 1); // مسح العدو
                            }
                            break;
                        }
                    }
                }
            }

            // تحديث الجزيئات (الانفجارات)
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx; p.y += p.vy; p.alpha -= 0.05;
                if (p.alpha <= 0) particles.splice(i, 1);
            }

            updateHUD();
        }

        // --- المؤثرات والرسم النهائي ---
        function draw() {
            ctx.save();
            
            // اهتزاز الشاشة (Juiciness)
            if (shakeTime > 0) {
                let dx = (Math.random() - 0.5) * 15;
                let dy = (Math.random() - 0.5) * 15;
                ctx.translate(dx, dy);
                shakeTime--;
            }

            drawRoad();

            // رسم الكيانات
            entities.forEach(e => {
                if (e.type === 'bullet') {
                    ctx.fillStyle = e.color; ctx.shadowBlur = 10; ctx.shadowColor = e.color;
                    ctx.fillRect(e.x - e.w/2, e.y, e.w, e.h); ctx.shadowBlur = 0;
                } else if (e.type === 'enemy') {
                    drawCar(e, true);
                } else if (e.type === 'coin') {
                    ctx.fillStyle = '#f1c40f'; ctx.beginPath();
                    ctx.arc(e.x, e.y, e.radius, 0, Math.PI*2); ctx.fill();
                    ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                    ctx.font = '16px Arial'; ctx.fillText('$', e.x, e.y);
                }
            });

            if (state === 'PLAYING') drawCar(player);

            // رسم الانفجارات
            particles.forEach(p => {
                ctx.globalAlpha = p.alpha; ctx.fillStyle = p.color;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
            });
            ctx.globalAlpha = 1;

            ctx.restore();
        }

        function gameLoop() {
            if (state === 'PLAYING') {
                update();
                draw();
                requestAnimationFrame(gameLoop);
            }
        }

        // المساعدات
        function createParticles(x, y, color, count = 10) {
            for (let i = 0; i < count; i++) {
                particles.push({
                    x: x, y: y, color: color, size: Math.random() * 5 + 2,
                    vx: (Math.random() - 0.5) * 10, vy: (Math.random() - 0.5) * 10, alpha: 1
                });
            }
        }

        function updateHUD() {
            scoreDisplay.innerText = player.score;
            coinDisplay.innerText = player.sessionCoins;
            healthBar.style.width = Math.max(0, player.health) + '%';
            if (player.health < 30) healthBar.style.background = '#ff0000';
            else healthBar.style.background = '#00e676';
        }

        function gameOver() {
            state = 'GAMEOVER';
            savedCoins += player.sessionCoins;
            localStorage.setItem('deathRaceCoins', savedCoins); // حفظ الفلوس بالمتصفح
            
            document.getElementById('finalScore').innerText = player.score;
            document.getElementById('finalCoins').innerText = player.sessionCoins;
            menuCoins.innerText = savedCoins;
            
            gameUI.classList.add('hidden');
            mobileControls.classList.add('hidden');
            gameOverScreen.classList.remove('hidden');
        }

        // --- التحكم بالأزرار واللمس ---
        window.addEventListener('keydown', e => keys[e.key] = true);
        window.addEventListener('keyup', e => keys[e.key] = false);

        const bindBtn = (id, key) => {
            const btn = document.getElementById(id);
            btn.addEventListener('touchstart', (e) => { e.preventDefault(); keys[key] = true; });
            btn.addEventListener('touchend', (e) => { e.preventDefault(); keys[key] = false; });
            btn.addEventListener('mousedown', () => keys[key] = true);
            btn.addEventListener('mouseup', () => keys[key] = false);
            btn.addEventListener('mouseleave', () => keys[key] = false);
        };

        bindBtn('btnLeft', 'btnLeft');
        bindBtn('btnRight', 'btnRight');
        bindBtn('btnShoot', 'btnShoot');

        document.getElementById('startBtn').addEventListener('click', initGame);
        document.getElementById('restartBtn').addEventListener('click', initGame);

        // رسم خلفية أولية للشاشة الرئيسية
        drawRoad(); 
    </script>
</body>
</html>
